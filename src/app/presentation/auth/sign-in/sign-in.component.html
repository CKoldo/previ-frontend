<div
  class="relative min-h-screen sm:flex sm:flex-row justify-center bg-transparent rounded-3xl shadow-xl"
>

  <div class="flex-col flex self-center lg:px-14 sm:max-w-4xl xl:max-w-md z-10">
    <div class="self-start hidden lg:flex flex-col text-gray-300">
      <h1 class="my-3 font-semibold text-4xl">PREVI</h1>
      <p class="pr-3 text-sm opacity-75">
        Ficha de registro al seguimiento a la implementación del Programa de Prevención de la Violencia Escolar en las instituciones educativas.
      </p>
    </div>
  </div>
  <div class="flex justify-center self-center z-10">
    <div class="p-12 bg-white mx-auto rounded-3xl w-96">
      <div class="mb-7">
        <h3 class="font-semibold text-2xl text-gray-800">Ingresar al registro</h3>
      </div>
      <div class="space-y-6" [formGroup]="formGroup">
        <div class="">
          <label for="ugel" class="block text-sm font-medium text-gray-700"
          >Tipo de institución</label
        >
          <p-select [options]="institution" formControlName="TIPO_INSTITUCION" optionLabel="name" optionValue="code" placeholder="Select a City" class="w-full  focus:outline-none" />
      </div>
        <div class="" >
          <label for="ugel" class="block text-sm font-medium text-gray-700"
          >Número de documento</label
        >
        <input
        pInputText
        type="text"
        formControlName="NUMERO_DOCUMENTO"
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md bg-white outline-none focus:border-blue-500 "
      />

        </div>

        <div class="relative" x-data="{ show: true }" *ngIf="TIPO_INSTITUCION?.value==1">
          <label for="ugel" class="block text-sm font-medium text-gray-700"
          >Código local</label
        >
        <input
        pInputText
        type="text"
        formControlName="CODIGO_LOCAL"
        class="mt-1 block w-full p-2 border border-gray-300 rounded-md bg-white outline-none focus:border-blue-500"
      />
          <div
            class="flex items-center absolute inset-y-0 right-0 mr-3 text-sm leading-5"
          ></div>
        </div>

        <div>
          <button
            pButton
            type="submit"
            (click)="signIn()"
            [disabled]="!formGroup.valid"
            [loading]="isLoading"
            loadingIcon="pi pi-spin pi-spinner"
            class="w-full flex justify-center bg-blue-500 text-gray-100 p-3 rounded-lg tracking-wide font-semibold cursor-pointer transition ease-in duration-500 disabled:cursor-not-allowed!"
          >
            Iniciar registro
          </button>
        </div>
      </div>
      <div class="mt-7 text-center text-gray-300 text-xs">
        <span>
          Copyright © 2025
</span
        >
      </div>
    </div>
  </div>
</div>
