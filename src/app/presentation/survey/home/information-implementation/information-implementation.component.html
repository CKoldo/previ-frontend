<div class="flex justify-between items-center">
  <h3 class="text-lg text-slate-900 font-semibold mb-4 mt-0">
    Información de la implementación
  </h3>
  <span class="text-md text-gray-500 flex items-end justify-end mb-2 w-[200px]"
    >Fase {{ selectedStage }} - Tarea {{ selectedPhase }}</span
  >
</div>

<div class="mb-4 flex flex-col gap-4 p-4 rounded-lg bg-white shadow-md">
  <div class="col-span-4 flex flex-col gap-2">
    <label for="nombre_ie" class="block text-sm font-medium text-gray-700 mb-2"
      >¿Se ha implentado la tarea?</label
    >
    <div class="flex items-center gap-2">
      <span>No</span
      ><p-toggleswitch
        [(ngModel)]="tareaImplementada"
        class="mt-2"
        (ngModelChange)="setDataInformationImplementation()"
      /><span>Si</span>
    </div>
  </div>

  <div class="col-span-4">
    <label for="nombre_ie" class="block text-sm font-medium text-gray-700"
      >Fecha</label
    >
    <p-datepicker
      [(ngModel)]="fechaModalidad"
      (ngModelChange)="setDataInformationImplementation()"
      class="mt-1 w-full rounded-md block"
      [appendTo]="'body'"
      inputStyleClass="w-full"
      [locale]="es"
      dateFormat="dd/mm/yy"
      [disabled]="isPhaseCompleted && isAllStagesCompleted"
      [readonlyInput]="true"
    ></p-datepicker>
  </div>

  <div
    class="mb-4"
    [ngClass]="{ 'mb-0!': selectedStage == 1 && selectedPhase == 5 }"
  >
    <label for="nombre_ie" class="block text-sm font-medium text-gray-700 mb-2"
      >Modalidad</label
    >
    <div class="flex flex-wrap gap-4 col-span-4">
      <div class="flex items-center">
        <p-radiobutton
          name="pizza"
          [value]="true"
          [(ngModel)]="modality"
          (ngModelChange)="setDataInformationImplementation()"
          [disabled]="isPhaseCompleted && isAllStagesCompleted"
        />
        <label for="ingredient1" class="ml-2">Presencial</label>
      </div>

      <div class="flex items-center">
        <p-radiobutton
          name="pizza"
          [value]="false"
          [(ngModel)]="modality"
          (ngModelChange)="setDataInformationImplementation()"
          [disabled]="isPhaseCompleted && isAllStagesCompleted"
        />
        <label for="ingredient2" class="ml-2">Virtual</label>
      </div>
    </div>
  </div>

  <div class="mb-4 mt-0" *ngIf="selectedPhase == 5 && tareaImplementada">
    <hr class="h-px my-4 bg-gray-200 border-0" />
    <div class="flex flex-col gap-4 col-span-4">
      <div class="col-span-4">
        <label for="nombre_ie" class="block text-sm font-medium text-gray-700"
          >Nombre de implementación</label
        >
        <input
          pInputText
          type="text"
          [(ngModel)]="nombreImplementacion"
          (ngModelChange)="setDataInformationImplementation()"
          [disabled]="isPhaseCompleted && isAllStagesCompleted"
          class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
        />
      </div>
    </div>
  </div>
</div>
