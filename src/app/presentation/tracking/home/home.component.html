<div class="flex flex-col items-center justify-start w-screen py-10">
  <div class="bg-[#eceef9] rounded-lg p-6 col-span-3 overflow-x-auto w-[90%] mx-8">
    <div class="my-2 mt-0 overflow-x-auto h-full">
      <div class="py-2 flex flex-col align-middle max-w-screen sm:px-6 lg:px-8 max-h-[1000px] justify-between">

        <div class="w-full grid gap-4 md:grid-cols-2 lg:grid-cols-2">
          <button *ngFor="let card of trackingYearCards" type="button" (click)="selectScheduleYear(card.year)"
            [ngClass]="{
              'border-sky-500 bg-white shadow-lg': selectedScheduleYear === card.year,
              'bg-white/80 hover:-translate-y-1 hover:shadow-md': selectedScheduleYear !== card.year,
              'opacity-60 cursor-not-allowed hover:translate-y-0 hover:shadow-none': !yearAvailability[card.year]
            }"
            class="transition-all duration-200 rounded-2xl border border-transparent p-5 text-left flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Año {{ card.year }}</span>
              <i class="pi text-lg" [ngClass]="card.icon"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-900">{{ card.title }}</h3>
            <p class="text-sm text-slate-600">{{ card.description }}</p>
            <span *ngIf="!yearAvailability[card.year]" class="text-xs font-semibold text-amber-600">Sin registros disponibles</span>
          </button>
        </div>

        <div class="flex gap-4 w-full justify-end items-center mt-6 pr-6">
          <div class="flex flex-col text-right mr-auto pl-2">
            <span class="text-xs uppercase tracking-wide text-slate-500">Año seleccionado</span>
            <span class="text-lg font-semibold text-slate-800">{{ selectedScheduleYear }}</span>
          </div>
          <button pButton (click)="generateReport()"
            class="bg-green-500 text-white p-2 w-60 cursor-pointer text-md transition ease-in duration-500 rounded-xl"
            [disabled]="isLoadingDownload" [loading]="isLoadingDownload" loadingIcon="pi pi-spin pi-spinner">
            {{isLoadingDownload?"Generando reporte":"Generar reporte"}}
          </button>
        </div>

        <div *ngIf="!hasDataForSelectedYear" class="mt-4 border border-dashed border-amber-400 bg-amber-50 text-amber-800 px-4 py-3 rounded-lg">
          No se encontraron registros para {{ selectedScheduleYear }}. Selecciona otro año para revisar el histórico disponible.
        </div>

        <app-table-checker class="mt-4" [scheduleYear]="selectedScheduleYear" />
      </div>
    </div>
  </div>
</div>
